# Dependabot config for KOMPAGNON
# Updates land on `staging` (not main) so they go through the dual-branch flow:
#   dependabot → staging → CI → PR staging→main → manual merge
#
# Schedule: weekly (Mondays). Groups bundle minor/patch updates so we get
# 2-3 PRs/week instead of 8 individual ones.

version: 2
updates:
  # ── Frontend (npm) ─────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /kompagnon/frontend
    target-branch: staging
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    groups:
      frontend-prod-minor:
        applies-to: version-updates
        dependency-type: production
        update-types:
          - minor
          - patch
      frontend-dev:
        applies-to: version-updates
        dependency-type: development
        update-types:
          - minor
          - patch
          - major
      frontend-security:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      # Major bumps for high-impact packages — we review these manually
      - dependency-name: bootstrap
        update-types:
          - version-update:semver-major
      - dependency-name: lucide-react
        update-types:
          - version-update:semver-major
      - dependency-name: react
        update-types:
          - version-update:semver-major
      - dependency-name: react-dom
        update-types:
          - version-update:semver-major
      - dependency-name: react-router-dom
        update-types:
          - version-update:semver-major

  # ── Backend (pip) ──────────────────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /kompagnon/backend
    target-branch: staging
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - backend
    groups:
      backend-minor:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      backend-security:
        applies-to: security-updates
        patterns:
          - "*"

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    target-branch: staging
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - ci
    groups:
      ci-actions:
        patterns:
          - "*"
