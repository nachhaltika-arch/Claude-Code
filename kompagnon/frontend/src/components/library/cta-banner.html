<!--
  Block: cta-banner — CTA-Banner (Streifen mit 1 Button)
  Kategorie: CTA
  Slots: headline, subline, cta_text, cta_url
-->
<section data-block="cta-banner" class="bg-[#004F59] text-white py-12 md:py-14 px-6" style="font-family: 'Noto Sans', sans-serif;">
  <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6 text-center md:text-left">
    <div class="flex-1">
      <h2 class="text-2xl md:text-3xl font-black uppercase tracking-tight mb-2">{{headline}}</h2>
      <p class="text-sm md:text-base text-white/80">{{subline}}</p>
    </div>
    <a href="{{cta_url}}" class="inline-flex items-center gap-2 bg-[#FAE600] text-black font-black px-7 py-3.5 rounded-lg text-base uppercase tracking-wide hover:bg-yellow-300 transition shadow-lg whitespace-nowrap">
      {{cta_text}}
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>
  </div>
</section>
