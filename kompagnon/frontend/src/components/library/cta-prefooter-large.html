<!--
  Block: cta-prefooter-large — Hero-Style grosse CTA-Section direkt vor Footer
  Kategorie: CTA
  Slots: section_eyebrow, section_headline, section_subline, primary_cta_text, primary_cta_url, secondary_cta_text, secondary_cta_url
  Pattern: Vollbreite dunkle Section direkt vor dem Footer als finaler
  Conversion-Punkt. Eyebrow + grosse Headline + Subline + 2 CTAs (Primary +
  Secondary). Visueller "Last-Chance"-Anchor, nimmt Page-Bottom-Aufmerksamkeit.
  Pattern-Inspiration: Standard-Pattern in 80%+ moderner Business-Tier-Templates
  (siehe docs/envato-template-inventory.md). Code komplett eigenstaendig +
  neutralisiert.
-->
<section data-block="cta-prefooter-large" class="bg-gray-900 text-white py-20 md:py-28 px-6 relative overflow-hidden" style="font-family: 'Noto Sans', sans-serif;">
  <!-- Subtler radial gradient overlay -->
  <div class="absolute inset-0 opacity-20 pointer-events-none" style="background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.15) 0%, transparent 60%), radial-gradient(circle at 70% 30%, rgba(255,255,255,0.08) 0%, transparent 50%);"></div>
  <div class="max-w-4xl mx-auto text-center relative">
    <div class="text-xs font-bold tracking-widest uppercase text-slate-400 mb-5">{{section_eyebrow}}</div>
    <h2 class="text-4xl md:text-6xl font-black leading-tight mb-6 tracking-tight">
      {{section_headline}}
    </h2>
    <p class="text-lg md:text-xl text-slate-300 leading-relaxed max-w-2xl mx-auto mb-10">{{section_subline}}</p>
    <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
      <a href="{{primary_cta_url}}"
         class="inline-flex items-center gap-2 bg-white text-gray-900 font-bold px-8 py-4 rounded-lg text-base hover:bg-slate-200 transition shadow-md">
        {{primary_cta_text}}
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
      <a href="{{secondary_cta_url}}"
         class="inline-flex items-center gap-2 border-2 border-white/30 text-white font-bold px-8 py-4 rounded-lg text-base hover:bg-white/10 transition">
        {{secondary_cta_text}}
      </a>
    </div>
  </div>
</section>
