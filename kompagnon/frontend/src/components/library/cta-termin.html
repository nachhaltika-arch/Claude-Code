<!--
  Block: cta-termin — Terminbuchung (Datum-Auswahl)
  Kategorie: CTA
  Slots: section_headline, section_subline, form_action, submit_text
-->
<section data-block="cta-termin" class="bg-white py-16 md:py-20 px-6" style="font-family: 'Noto Sans', sans-serif;">
  <div class="max-w-2xl mx-auto">
    <div class="text-center mb-10">
      <h2 class="text-3xl md:text-4xl font-black uppercase text-gray-900 tracking-tight mb-3">{{section_headline}}</h2>
      <p class="text-base text-slate-600 leading-relaxed">{{section_subline}}</p>
    </div>
    <form action="{{form_action}}" method="post" class="bg-slate-50 rounded-2xl border border-slate-200 p-7 md:p-9 space-y-4">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <label class="block">
          <span class="text-xs font-bold uppercase tracking-wide text-slate-500">Name *</span>
          <input type="text" name="name" required class="mt-1 w-full px-4 py-3 border border-slate-300 rounded-lg focus:border-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-700/30 text-base bg-white">
        </label>
        <label class="block">
          <span class="text-xs font-bold uppercase tracking-wide text-slate-500">Telefon *</span>
          <input type="tel" name="phone" required class="mt-1 w-full px-4 py-3 border border-slate-300 rounded-lg focus:border-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-700/30 text-base bg-white">
        </label>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <label class="block">
          <span class="text-xs font-bold uppercase tracking-wide text-slate-500">Wunsch-Datum *</span>
          <input type="date" name="preferred_date" required class="mt-1 w-full px-4 py-3 border border-slate-300 rounded-lg focus:border-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-700/30 text-base bg-white">
        </label>
        <label class="block">
          <span class="text-xs font-bold uppercase tracking-wide text-slate-500">Tageszeit</span>
          <select name="preferred_time" class="mt-1 w-full px-4 py-3 border border-slate-300 rounded-lg focus:border-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-700/30 text-base bg-white">
            <option value="vormittag">Vormittag (8–12 Uhr)</option>
            <option value="mittag">Mittag (12–14 Uhr)</option>
            <option value="nachmittag">Nachmittag (14–17 Uhr)</option>
          </select>
        </label>
      </div>
      <label class="block">
        <span class="text-xs font-bold uppercase tracking-wide text-slate-500">Anliegen / Adresse</span>
        <textarea name="details" rows="3" class="mt-1 w-full px-4 py-3 border border-slate-300 rounded-lg focus:border-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-700/30 text-base bg-white"></textarea>
      </label>
      <button type="submit" class="w-full bg-gray-300 text-black font-black py-3.5 rounded-lg uppercase tracking-wide hover:bg-gray-300 transition text-base">
        {{submit_text}}
      </button>
      <p class="text-[11px] text-slate-500 text-center pt-1">Wir bestätigen jeden Termin schriftlich innerhalb von 2 h.</p>
    </form>
  </div>
</section>
