<form
      action="#"
      class="mx-auto grid max-w-lg grid-cols-1 gap-4 rounded-lg border border-gray-300 bg-gray-100 p-6 sm:grid-cols-2"
    >
      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-900" for="name">Name</label>

        <input
          class="mt-1 w-full rounded-lg border-gray-300 focus:border-gray-500 focus:outline-none"
          id="name"
          type="text"
          placeholder="Your name"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-900" for="email">Email</label>

        <input
          class="mt-1 w-full rounded-lg border-gray-300 focus:border-gray-500 focus:outline-none"
          id="email"
          type="email"
          placeholder="Your email"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-900" for="phone">Phone</label>

        <input
          class="mt-1 w-full rounded-lg border-gray-300 focus:border-gray-500 focus:outline-none"
          id="phone"
          type="tel"
          placeholder="Your phone"
        />
      </div>

      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-900" for="message">Message</label>

        <textarea
          class="mt-1 w-full resize-none rounded-lg border-gray-300 focus:border-gray-500 focus:outline-none"
          id="message"
          rows="4"
          placeholder="Your message"
        ></textarea>
      </div>

      <div class="md:col-span-2">
        <button
          class="block w-full rounded-lg border border-gray-600 bg-gray-600 px-12 py-3 text-sm font-medium text-white transition-colors hover:bg-transparent hover:text-gray-600"
          type="submit"
        >
          Send Message
        </button>
      </div>
    </form>
