<!--
  Block: foot-standard — Footer Standard (4 Spalten)
  Kategorie: FOOT
  Slots: logo_text, tagline, address, phone, phone_url, email,
         impressum_url, datenschutz_url, agb_url,
         social_facebook, social_instagram, copyright_year
-->
<footer data-block="foot-standard" class="bg-[#004F59] text-white" style="font-family: 'Noto Sans', sans-serif;">
  <div class="max-w-6xl mx-auto px-6 py-14 grid grid-cols-1 md:grid-cols-4 gap-8 md:gap-10">
    <div class="md:col-span-1">
      <div class="text-xl font-black uppercase tracking-tight text-white mb-3">{{logo_text}}</div>
      <p class="text-sm text-white/70 leading-relaxed">{{tagline}}</p>
    </div>
    <div>
      <div class="text-xs font-bold uppercase tracking-widest text-[#FAE600] mb-4">Navigation</div>
      <ul class="space-y-2 text-sm">
        <li><a href="#leistungen" class="text-white/80 hover:text-[#FAE600] transition">Leistungen</a></li>
        <li><a href="#ueber-uns"  class="text-white/80 hover:text-[#FAE600] transition">Über uns</a></li>
        <li><a href="#referenzen" class="text-white/80 hover:text-[#FAE600] transition">Referenzen</a></li>
        <li><a href="#kontakt"    class="text-white/80 hover:text-[#FAE600] transition">Kontakt</a></li>
      </ul>
    </div>
    <div>
      <div class="text-xs font-bold uppercase tracking-widest text-[#FAE600] mb-4">Kontakt</div>
      <ul class="space-y-2 text-sm text-white/80">
        <li>{{address}}</li>
        <li><a href="{{phone_url}}" class="hover:text-[#FAE600] transition font-semibold">{{phone}}</a></li>
        <li><a href="mailto:{{email}}" class="hover:text-[#FAE600] transition">{{email}}</a></li>
      </ul>
    </div>
    <div>
      <div class="text-xs font-bold uppercase tracking-widest text-[#FAE600] mb-4">Folgen Sie uns</div>
      <div class="flex items-center gap-3">
        <a href="{{social_facebook}}" target="_blank" rel="noopener" aria-label="Facebook" class="w-10 h-10 rounded-full bg-white/10 hover:bg-[#FAE600] hover:text-black flex items-center justify-center transition">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.99 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.128 22 16.99 22 12z"/></svg>
        </a>
        <a href="{{social_instagram}}" target="_blank" rel="noopener" aria-label="Instagram" class="w-10 h-10 rounded-full bg-white/10 hover:bg-[#FAE600] hover:text-black flex items-center justify-center transition">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
        </a>
      </div>
    </div>
  </div>
  <div class="border-t border-white/10">
    <div class="max-w-6xl mx-auto px-6 py-5 flex flex-col md:flex-row items-center justify-between gap-3 text-xs text-white/60">
      <div>© {{copyright_year}} {{logo_text}} — Alle Rechte vorbehalten.</div>
      <div class="flex items-center gap-4">
        <a href="{{impressum_url}}" class="hover:text-[#FAE600] transition">Impressum</a>
        <a href="{{datenschutz_url}}" class="hover:text-[#FAE600] transition">Datenschutz</a>
        <a href="{{agb_url}}" class="hover:text-[#FAE600] transition">AGB</a>
      </div>
    </div>
  </div>
</footer>
