<!--
  Block: hero-badges — Hero mit Vertrauens-Badges
  Kategorie: HERO
  Slots: headline, subline, cta_text, cta_url, image_url, image_alt,
         badge_1, badge_2, badge_3
-->
<section data-block="hero-badges" class="bg-white" style="font-family: 'Noto Sans', sans-serif;">
  <div class="py-16 md:py-24 px-6">
    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10 md:gap-14 items-center">
      <div>
        <h1 class="text-4xl md:text-5xl font-black uppercase leading-tight text-[#004F59] mb-5 tracking-tight">
          {{headline}}
        </h1>
        <p class="text-lg text-slate-600 leading-relaxed mb-8">{{subline}}</p>
        <a href="{{cta_url}}"
           class="inline-flex items-center gap-2 bg-[#008EAA] text-white font-bold px-7 py-3.5 rounded-lg text-base hover:bg-[#004F59] transition shadow-md">
          {{cta_text}}
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </a>
      </div>
      <div class="rounded-2xl overflow-hidden shadow-xl">
        <img src="{{image_url}}" alt="{{image_alt}}" class="w-full h-72 md:h-96 object-cover" loading="lazy">
      </div>
    </div>
  </div>

  <div class="bg-[#004F59] text-white">
    <div class="max-w-6xl mx-auto px-6 py-5 grid grid-cols-1 sm:grid-cols-3 gap-4 text-center">
      <div class="flex items-center justify-center gap-2 font-bold text-sm md:text-base">
        <span class="text-[#FAE600]">{{badge_1}}</span>
      </div>
      <div class="flex items-center justify-center gap-2 font-bold text-sm md:text-base border-t sm:border-t-0 sm:border-l sm:border-r border-white/15 pt-3 sm:pt-0">
        {{badge_2}}
      </div>
      <div class="flex items-center justify-center gap-2 font-bold text-sm md:text-base border-t sm:border-t-0 border-white/15 pt-3 sm:pt-0">
        {{badge_3}}
      </div>
    </div>
  </div>
</section>
