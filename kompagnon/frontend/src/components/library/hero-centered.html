<!--
  Block: hero-centered — Hero Centered (zentriert)
  Kategorie: HERO
  Slots: headline, subline, primary_cta_text, primary_cta_url,
         secondary_cta_text, secondary_cta_url, bg_image_url
-->
<section data-block="hero-centered"
         class="relative bg-slate-900 text-white py-24 md:py-32 px-6 overflow-hidden"
         style="font-family: 'Noto Sans', sans-serif; background-image: linear-gradient(rgba(0,79,89,0.78), rgba(0,79,89,0.78)), url('{{bg_image_url}}'); background-size: cover; background-position: center;">
  <div class="max-w-3xl mx-auto text-center">
    <h1 class="text-4xl md:text-6xl font-black uppercase leading-tight mb-6 tracking-tight">
      {{headline}}
    </h1>
    <p class="text-lg md:text-xl text-white/85 leading-relaxed mb-9 max-w-2xl mx-auto">
      {{subline}}
    </p>
    <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
      <a href="{{primary_cta_url}}"
         class="inline-flex items-center justify-center gap-2 bg-[#FAE600] text-black font-black px-7 py-3.5 rounded-lg text-base uppercase tracking-wide hover:bg-yellow-300 transition shadow-lg w-full sm:w-auto">
        {{primary_cta_text}}
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
      <a href="{{secondary_cta_url}}"
         class="inline-flex items-center justify-center gap-2 border-2 border-white/40 text-white font-bold px-7 py-3 rounded-lg text-base hover:bg-white/10 transition w-full sm:w-auto">
        {{secondary_cta_text}}
      </a>
    </div>
  </div>
</section>
