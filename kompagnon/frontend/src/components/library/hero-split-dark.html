<!--
  Block: hero-split-dark — Hero Split Dark
  Kategorie: HERO
  Slots: headline, subline, cta_text, cta_url, image_url, image_alt
-->
<section data-block="hero-split-dark" class="bg-white" style="font-family: 'Noto Sans', sans-serif;">
  <div class="grid grid-cols-1 md:grid-cols-2 min-h-[480px] md:min-h-[560px]">
    <div class="bg-gray-900 text-white flex items-center px-6 md:px-12 py-14 md:py-20">
      <div class="max-w-md">
        <h1 class="text-4xl md:text-5xl font-black uppercase leading-tight mb-6 tracking-tight">
          {{headline}}
        </h1>
        <p class="text-lg text-white/85 leading-relaxed mb-9">{{subline}}</p>
        <a href="{{cta_url}}"
           class="inline-flex items-center gap-2 bg-gray-300 text-black font-black px-7 py-3.5 rounded-lg text-base uppercase tracking-wide hover:bg-gray-300 transition shadow-md">
          {{cta_text}}
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </a>
      </div>
    </div>
    <div class="relative overflow-hidden">
      <img src="{{image_url}}" alt="{{image_alt}}" class="w-full h-full object-cover" loading="lazy">
    </div>
  </div>
</section>
