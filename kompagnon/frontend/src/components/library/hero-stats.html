<!--
  Block: hero-stats — Hero Split mit Stats-Block statt Image
  Kategorie: HERO
  Slots: headline, subline, cta_text, cta_url,
         stat_1_value, stat_1_label,
         stat_2_value, stat_2_label,
         stat_3_value, stat_3_label
  Pattern: Headline+CTA links, 3 Stat-Cards rechts. Mittlere Card
  ist Dark-Inverted als visueller Anker. Kein Image nötig — gut für
  Trust-Aufbau wenn keine starken Foto-Assets verfügbar sind.
-->
<section data-block="hero-stats" class="bg-white py-16 md:py-24 px-6" style="font-family: 'Noto Sans', sans-serif;">
  <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10 lg:gap-14 items-center">
    <div>
      <h1 class="text-4xl md:text-5xl font-black uppercase leading-tight text-gray-900 mb-6 tracking-tight">
        {{headline}}
      </h1>
      <p class="text-lg text-slate-600 leading-relaxed mb-8 max-w-xl">{{subline}}</p>
      <a href="{{cta_url}}"
         class="inline-flex items-center gap-2 bg-gray-900 text-white font-bold px-7 py-3.5 rounded-lg text-base hover:bg-gray-700 transition shadow-md">
        {{cta_text}}
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
      <div class="bg-slate-50 rounded-2xl p-6 border border-slate-200">
        <div class="text-3xl md:text-4xl font-black text-gray-900 mb-1 tracking-tight">{{stat_1_value}}</div>
        <div class="text-sm text-slate-600 leading-tight">{{stat_1_label}}</div>
      </div>
      <div class="bg-gray-900 text-white rounded-2xl p-6 sm:-translate-y-3 shadow-lg">
        <div class="text-3xl md:text-4xl font-black mb-1 tracking-tight">{{stat_2_value}}</div>
        <div class="text-sm text-white/80 leading-tight">{{stat_2_label}}</div>
      </div>
      <div class="bg-slate-50 rounded-2xl p-6 border border-slate-200">
        <div class="text-3xl md:text-4xl font-black text-gray-900 mb-1 tracking-tight">{{stat_3_value}}</div>
        <div class="text-sm text-slate-600 leading-tight">{{stat_3_label}}</div>
      </div>
    </div>
  </div>
</section>
