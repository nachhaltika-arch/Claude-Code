<!--
  Block: hero-video — Hero mit Hintergrund-Video
  Kategorie: HERO
  Slots: headline, subline, cta_text, cta_url, video_url, video_poster
-->
<section data-block="hero-video" class="relative bg-slate-900 text-white py-24 md:py-32 px-6 overflow-hidden" style="font-family: 'Noto Sans', sans-serif;">
  <video autoplay muted loop playsinline poster="{{video_poster}}"
         class="absolute inset-0 w-full h-full object-cover -z-10" aria-hidden="true">
    <source src="{{video_url}}" type="video/mp4">
  </video>
  <div class="absolute inset-0 bg-gray-900/70 -z-10" aria-hidden="true"></div>

  <div class="max-w-3xl mx-auto text-center relative">
    <h1 class="text-4xl md:text-6xl font-black uppercase leading-tight mb-6 tracking-tight">
      {{headline}}
    </h1>
    <p class="text-lg md:text-xl text-white/90 leading-relaxed mb-9 max-w-2xl mx-auto">
      {{subline}}
    </p>
    <a href="{{cta_url}}"
       class="inline-flex items-center justify-center gap-2 bg-gray-300 text-black font-black px-7 py-3.5 rounded-lg text-base uppercase tracking-wide hover:bg-gray-300 transition shadow-lg">
      {{cta_text}}
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>
  </div>
</section>
