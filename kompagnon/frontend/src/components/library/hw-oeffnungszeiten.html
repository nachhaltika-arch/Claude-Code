<!--
  Block: hw-oeffnungszeiten — Öffnungszeiten + Notdienst-Hinweis
  Kategorie: HW
  Slots: section_headline, mo_fr, sa, so,
         notdienst_text, notdienst_phone, notdienst_url
-->
<section data-block="hw-oeffnungszeiten" class="bg-white py-16 md:py-20 px-6" style="font-family: 'Noto Sans', sans-serif;">
  <div class="max-w-5xl mx-auto">
    <h2 class="text-3xl md:text-4xl font-black uppercase text-[#004F59] tracking-tight text-center mb-12">{{section_headline}}</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
      <div class="bg-slate-50 rounded-2xl p-7 border border-slate-200">
        <h3 class="text-sm font-bold uppercase tracking-widest text-slate-500 mb-5">Reguläre Zeiten</h3>
        <dl class="space-y-3 text-base">
          <div class="flex items-center justify-between border-b border-slate-200 pb-3">
            <dt class="font-semibold text-[#004F59]">Montag – Freitag</dt>
            <dd class="text-slate-700 tabular-nums">{{mo_fr}}</dd>
          </div>
          <div class="flex items-center justify-between border-b border-slate-200 pb-3">
            <dt class="font-semibold text-[#004F59]">Samstag</dt>
            <dd class="text-slate-700 tabular-nums">{{sa}}</dd>
          </div>
          <div class="flex items-center justify-between">
            <dt class="font-semibold text-[#004F59]">Sonntag</dt>
            <dd class="text-slate-700 tabular-nums">{{so}}</dd>
          </div>
        </dl>
      </div>
      <div class="bg-red-700 text-white rounded-2xl p-7 flex flex-col">
        <h3 class="text-sm font-bold uppercase tracking-widest text-[#FAE600] mb-3">Notdienst 24/7</h3>
        <p class="text-base text-white/90 leading-relaxed mb-6 flex-1">{{notdienst_text}}</p>
        <a href="{{notdienst_url}}" class="inline-flex items-center justify-center gap-2 bg-[#FAE600] text-black font-black px-5 py-3 rounded-lg text-base uppercase tracking-wide hover:bg-yellow-300 transition shadow">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          {{notdienst_phone}}
        </a>
      </div>
    </div>
  </div>
</section>
