<!--
  Block: hw-vor-ort — Vor-Ort-Termin (Wir kommen zu Ihnen)
  Kategorie: HW
  Slots: headline, subline, radius_km, city, cta_text, cta_url
-->
<section data-block="hw-vor-ort" class="bg-gray-900 text-white py-16 md:py-20 px-6" style="font-family: 'Noto Sans', sans-serif;">
  <div class="max-w-4xl mx-auto text-center">
    <div class="inline-flex items-center gap-2 bg-white/10 text-gray-300 text-xs font-black uppercase tracking-widest px-4 py-1.5 rounded-full mb-5">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      {{radius_km}} km Umkreis {{city}}
    </div>
    <h2 class="text-3xl md:text-5xl font-black uppercase tracking-tight leading-tight mb-5">{{headline}}</h2>
    <p class="text-base md:text-lg text-white/85 leading-relaxed mb-9 max-w-2xl mx-auto">{{subline}}</p>
    <a href="{{cta_url}}" class="inline-flex items-center gap-2 bg-gray-300 text-black font-black px-8 py-4 rounded-lg text-base md:text-lg uppercase tracking-wide hover:bg-gray-300 transition shadow-xl">
      {{cta_text}}
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>
  </div>
</section>
