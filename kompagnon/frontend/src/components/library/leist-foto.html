<!--
  Block: leist-foto — Leistungen mit Foto (alternierend)
  Kategorie: LEIST
  Slots: section_headline,
         item_1_title, item_1_desc, item_1_image, item_1_alt,
         item_2_title, item_2_desc, item_2_image, item_2_alt,
         item_3_title, item_3_desc, item_3_image, item_3_alt
-->
<section data-block="leist-foto" class="bg-white py-16 md:py-24 px-6" style="font-family: 'Noto Sans', sans-serif;">
  <div class="max-w-6xl mx-auto">
    <h2 class="text-3xl md:text-4xl font-black uppercase text-gray-900 tracking-tight text-center mb-14">{{section_headline}}</h2>

    <article class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 items-center mb-16">
      <div class="rounded-2xl overflow-hidden shadow-lg order-1 md:order-1">
        <img src="{{item_1_image}}" alt="{{item_1_alt}}" class="w-full h-72 md:h-80 object-cover" loading="lazy">
      </div>
      <div class="order-2 md:order-2">
        <h3 class="text-2xl md:text-3xl font-black uppercase text-gray-900 mb-4 tracking-tight">{{item_1_title}}</h3>
        <p class="text-base text-slate-600 leading-relaxed">{{item_1_desc}}</p>
      </div>
    </article>

    <article class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 items-center mb-16">
      <div class="order-1 md:order-2 rounded-2xl overflow-hidden shadow-lg">
        <img src="{{item_2_image}}" alt="{{item_2_alt}}" class="w-full h-72 md:h-80 object-cover" loading="lazy">
      </div>
      <div class="order-2 md:order-1">
        <h3 class="text-2xl md:text-3xl font-black uppercase text-gray-900 mb-4 tracking-tight">{{item_2_title}}</h3>
        <p class="text-base text-slate-600 leading-relaxed">{{item_2_desc}}</p>
      </div>
    </article>

    <article class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 items-center">
      <div class="rounded-2xl overflow-hidden shadow-lg order-1 md:order-1">
        <img src="{{item_3_image}}" alt="{{item_3_alt}}" class="w-full h-72 md:h-80 object-cover" loading="lazy">
      </div>
      <div class="order-2 md:order-2">
        <h3 class="text-2xl md:text-3xl font-black uppercase text-gray-900 mb-4 tracking-tight">{{item_3_title}}</h3>
        <p class="text-base text-slate-600 leading-relaxed">{{item_3_desc}}</p>
      </div>
    </article>
  </div>
</section>
