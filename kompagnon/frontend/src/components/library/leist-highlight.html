<!--
  Block: leist-highlight — Produkt-Highlight (eine Leistung groß)
  Kategorie: LEIST
  Slots: section_headline, highlight_title, highlight_desc,
         highlight_image, highlight_alt, cta_text, cta_url,
         feature_1, feature_2, feature_3
-->
<section data-block="leist-highlight" class="bg-white py-16 md:py-24 px-6" style="font-family: 'Noto Sans', sans-serif;">
  <div class="max-w-6xl mx-auto">
    <p class="text-sm font-bold uppercase tracking-widest text-[#008EAA] text-center mb-3">{{section_headline}}</p>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-10 md:gap-14 items-center">
      <div class="rounded-2xl overflow-hidden shadow-2xl">
        <img src="{{highlight_image}}" alt="{{highlight_alt}}" class="w-full h-80 md:h-96 object-cover" loading="lazy">
      </div>
      <div>
        <h2 class="text-3xl md:text-4xl font-black uppercase text-[#004F59] tracking-tight mb-5 leading-tight">{{highlight_title}}</h2>
        <p class="text-base text-slate-600 leading-relaxed mb-6">{{highlight_desc}}</p>
        <ul class="space-y-3 mb-8">
          <li class="flex items-start gap-3">
            <span class="flex-shrink-0 w-6 h-6 rounded-full bg-[#008EAA] flex items-center justify-center mt-0.5">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
            </span>
            <span class="text-base text-slate-700 font-medium">{{feature_1}}</span>
          </li>
          <li class="flex items-start gap-3">
            <span class="flex-shrink-0 w-6 h-6 rounded-full bg-[#008EAA] flex items-center justify-center mt-0.5">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
            </span>
            <span class="text-base text-slate-700 font-medium">{{feature_2}}</span>
          </li>
          <li class="flex items-start gap-3">
            <span class="flex-shrink-0 w-6 h-6 rounded-full bg-[#008EAA] flex items-center justify-center mt-0.5">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
            </span>
            <span class="text-base text-slate-700 font-medium">{{feature_3}}</span>
          </li>
        </ul>
        <a href="{{cta_url}}" class="inline-flex items-center gap-2 bg-[#FAE600] text-black font-black px-7 py-3.5 rounded-lg text-base uppercase tracking-wide hover:bg-yellow-300 transition shadow-md">
          {{cta_text}}
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </a>
      </div>
    </div>
  </div>
</section>
