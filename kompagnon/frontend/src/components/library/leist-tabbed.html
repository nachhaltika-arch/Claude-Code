<!--
  Block: leist-tabbed — Leistungen Tabbed (CSS-only via <details>)
  Kategorie: LEIST
  Slots: section_headline,
         tab_1_title, tab_1_content,
         tab_2_title, tab_2_content,
         tab_3_title, tab_3_content
  Hinweis: Stateless via native <details>/<summary>. Auf Desktop können
  alle 3 simultan offen sein — das ist akzeptabel für SEO/Crawling.
-->
<section data-block="leist-tabbed" class="bg-slate-50 py-16 md:py-20 px-6" style="font-family: 'Noto Sans', sans-serif;">
  <div class="max-w-4xl mx-auto">
    <h2 class="text-3xl md:text-4xl font-black uppercase text-[#004F59] tracking-tight text-center mb-12">{{section_headline}}</h2>
    <div class="space-y-3">
      <details class="group bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden" open>
        <summary class="cursor-pointer px-6 py-5 flex items-center justify-between text-lg font-bold text-[#004F59] hover:bg-slate-50 transition list-none">
          <span class="uppercase tracking-tight">{{tab_1_title}}</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="transition-transform group-open:rotate-180" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
        </summary>
        <div class="px-6 pb-6 pt-2 text-base text-slate-600 leading-relaxed border-t border-slate-100">{{tab_1_content}}</div>
      </details>
      <details class="group bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <summary class="cursor-pointer px-6 py-5 flex items-center justify-between text-lg font-bold text-[#004F59] hover:bg-slate-50 transition list-none">
          <span class="uppercase tracking-tight">{{tab_2_title}}</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="transition-transform group-open:rotate-180" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
        </summary>
        <div class="px-6 pb-6 pt-2 text-base text-slate-600 leading-relaxed border-t border-slate-100">{{tab_2_content}}</div>
      </details>
      <details class="group bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <summary class="cursor-pointer px-6 py-5 flex items-center justify-between text-lg font-bold text-[#004F59] hover:bg-slate-50 transition list-none">
          <span class="uppercase tracking-tight">{{tab_3_title}}</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="transition-transform group-open:rotate-180" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
        </summary>
        <div class="px-6 pb-6 pt-2 text-base text-slate-600 leading-relaxed border-t border-slate-100">{{tab_3_content}}</div>
      </details>
    </div>
  </div>
</section>
