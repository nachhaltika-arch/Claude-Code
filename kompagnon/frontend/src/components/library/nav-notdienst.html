<!--
  Block: nav-notdienst — Sticky Notfall-Banner
  Kategorie: NAV
  Slots: message, phone, phone_url
  Brand-Farben: #FAE600 (accent CTA) auf rotem Hintergrund (Urgency-Signal).
  Wird ZUSÄTZLICH zur Hauptnavigation eingefügt — kein Replacement.
-->
<aside data-block="nav-notdienst" role="banner" class="sticky top-0 z-50 bg-gray-700 text-white shadow-md" style="font-family: 'Noto Sans', sans-serif;">
  <div class="max-w-6xl mx-auto px-4 py-2.5 flex flex-wrap items-center justify-center gap-3 text-sm md:text-base font-semibold">
    <span class="inline-flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span>{{message}}</span>
    </span>
    <a href="{{phone_url}}"
       class="inline-flex items-center gap-2 bg-gray-300 text-black font-black px-4 py-1.5 rounded-md text-sm md:text-base hover:bg-gray-300 transition uppercase tracking-wide"
       aria-label="Notdienst anrufen">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <span>{{phone}}</span>
    </a>
  </div>
</aside>
