<!--
  Block: nav-telefon — Navbar mit Telefon
  Kategorie: NAV
  Slots: logo_text, phone, phone_url
  Brand-Farben: #004F59 (dark), #008EAA (primary), #FAE600 (accent)
-->
<header data-block="nav-telefon" class="sticky top-0 z-40 bg-white border-b border-slate-200 shadow-sm" style="font-family: 'Noto Sans', sans-serif;">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between gap-6">
    <a href="#" class="text-xl font-black tracking-tight text-gray-900 uppercase">{{logo_text}}</a>

    <nav class="hidden lg:flex items-center gap-7 text-sm font-semibold text-slate-700">
      <a href="#leistungen" class="hover:text-gray-700 transition">Leistungen</a>
      <a href="#ueber-uns"  class="hover:text-gray-700 transition">Über uns</a>
      <a href="#referenzen" class="hover:text-gray-700 transition">Referenzen</a>
      <a href="#kontakt"    class="hover:text-gray-700 transition">Kontakt</a>
    </nav>

    <a href="{{phone_url}}"
       class="inline-flex items-center gap-2 bg-gray-700 text-white font-bold px-5 py-2.5 rounded-full text-sm md:text-base hover:bg-gray-900 transition shadow-md"
       aria-label="Jetzt anrufen">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <span class="whitespace-nowrap">{{phone}}</span>
    </a>

    <button type="button" aria-label="Menü öffnen"
            class="lg:hidden p-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-700 rounded">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
</header>
