<!--
  Block: seo-blog — Blog-Teaser (3 Artikel)
  Kategorie: SEO
  Slots: section_headline, section_subline,
         post_1..3_image, post_1..3_title, post_1..3_excerpt,
         post_1..3_url, post_1..3_date
-->
<section data-block="seo-blog" class="bg-white py-16 md:py-20 px-6" style="font-family: 'Noto Sans', sans-serif;">
  <div class="max-w-6xl mx-auto">
    <div class="text-center mb-12 max-w-2xl mx-auto">
      <h2 class="text-3xl md:text-4xl font-black uppercase text-gray-900 tracking-tight mb-3">{{section_headline}}</h2>
      <p class="text-base text-slate-600 leading-relaxed">{{section_subline}}</p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <article class="bg-slate-50 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition flex flex-col">
        <a href="{{post_1_url}}" class="block aspect-[16/10] overflow-hidden">
          <img src="{{post_1_image}}" alt="{{post_1_title}}" class="w-full h-full object-cover hover:scale-105 transition duration-500" loading="lazy">
        </a>
        <div class="p-6 flex-1 flex flex-col">
          <div class="text-xs font-bold uppercase tracking-widest text-gray-700 mb-3">{{post_1_date}}</div>
          <h3 class="text-lg font-black text-gray-900 tracking-tight mb-3 leading-snug flex-1">
            <a href="{{post_1_url}}" class="hover:text-gray-700 transition">{{post_1_title}}</a>
          </h3>
          <p class="text-sm text-slate-600 leading-relaxed mb-4">{{post_1_excerpt}}</p>
          <a href="{{post_1_url}}" class="inline-flex items-center gap-1 text-sm font-bold text-gray-700 hover:gap-2 transition-all">Weiterlesen
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </a>
        </div>
      </article>
      <article class="bg-slate-50 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition flex flex-col">
        <a href="{{post_2_url}}" class="block aspect-[16/10] overflow-hidden">
          <img src="{{post_2_image}}" alt="{{post_2_title}}" class="w-full h-full object-cover hover:scale-105 transition duration-500" loading="lazy">
        </a>
        <div class="p-6 flex-1 flex flex-col">
          <div class="text-xs font-bold uppercase tracking-widest text-gray-700 mb-3">{{post_2_date}}</div>
          <h3 class="text-lg font-black text-gray-900 tracking-tight mb-3 leading-snug flex-1">
            <a href="{{post_2_url}}" class="hover:text-gray-700 transition">{{post_2_title}}</a>
          </h3>
          <p class="text-sm text-slate-600 leading-relaxed mb-4">{{post_2_excerpt}}</p>
          <a href="{{post_2_url}}" class="inline-flex items-center gap-1 text-sm font-bold text-gray-700 hover:gap-2 transition-all">Weiterlesen
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </a>
        </div>
      </article>
      <article class="bg-slate-50 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition flex flex-col">
        <a href="{{post_3_url}}" class="block aspect-[16/10] overflow-hidden">
          <img src="{{post_3_image}}" alt="{{post_3_title}}" class="w-full h-full object-cover hover:scale-105 transition duration-500" loading="lazy">
        </a>
        <div class="p-6 flex-1 flex flex-col">
          <div class="text-xs font-bold uppercase tracking-widest text-gray-700 mb-3">{{post_3_date}}</div>
          <h3 class="text-lg font-black text-gray-900 tracking-tight mb-3 leading-snug flex-1">
            <a href="{{post_3_url}}" class="hover:text-gray-700 transition">{{post_3_title}}</a>
          </h3>
          <p class="text-sm text-slate-600 leading-relaxed mb-4">{{post_3_excerpt}}</p>
          <a href="{{post_3_url}}" class="inline-flex items-center gap-1 text-sm font-bold text-gray-700 hover:gap-2 transition-all">Weiterlesen
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </a>
        </div>
      </article>
    </div>
  </div>
</section>
