<!--
  Block: seo-leistung-hero — Leistungsseiten-Hero (keyword-fokussiert)
  Kategorie: SEO
  Slots: breadcrumb, h1, intro, cta_text, cta_url, image_url, image_alt
-->
<section data-block="seo-leistung-hero" class="bg-white border-b border-slate-100" style="font-family: 'Noto Sans', sans-serif;">
  <div class="max-w-6xl mx-auto px-6 pt-6 pb-2">
    <nav class="text-xs text-slate-500" aria-label="Breadcrumb">{{breadcrumb}}</nav>
  </div>
  <div class="max-w-6xl mx-auto px-6 py-10 md:py-14 grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 items-center">
    <div>
      <h1 class="text-3xl md:text-4xl lg:text-5xl font-black uppercase text-gray-900 tracking-tight leading-tight mb-4">{{h1}}</h1>
      <p class="text-base md:text-lg text-slate-600 leading-relaxed mb-6">{{intro}}</p>
      <a href="{{cta_url}}" class="inline-flex items-center gap-2 bg-gray-700 text-white font-bold px-6 py-3 rounded-lg text-base hover:bg-gray-900 transition shadow-md">
        {{cta_text}}
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
    </div>
    <div class="rounded-2xl overflow-hidden shadow-lg">
      <img src="{{image_url}}" alt="{{image_alt}}" class="w-full h-64 md:h-80 object-cover" loading="lazy">
    </div>
  </div>
</section>
