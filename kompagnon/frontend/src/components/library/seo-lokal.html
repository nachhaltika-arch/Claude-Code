<!--
  Block: seo-lokal — Lokaler SEO-Block (Karte + Einzugsgebiet)
  Kategorie: SEO
  Slots: section_headline, service_area, address, phone, phone_url, map_embed_url
-->
<section data-block="seo-lokal" class="bg-slate-50 py-16 md:py-20 px-6" style="font-family: 'Noto Sans', sans-serif;">
  <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10 md:gap-12 items-stretch">
    <div class="flex flex-col justify-center">
      <h2 class="text-3xl md:text-4xl font-black uppercase text-gray-900 tracking-tight mb-5">{{section_headline}}</h2>
      <p class="text-base text-slate-600 leading-relaxed mb-7">{{service_area}}</p>
      <div class="space-y-3 text-base">
        <div class="flex items-start gap-3">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#008EAA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0 mt-0.5" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span class="text-slate-700">{{address}}</span>
        </div>
        <div class="flex items-start gap-3">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#008EAA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0 mt-0.5" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          <a href="{{phone_url}}" class="font-bold text-gray-700 hover:underline">{{phone}}</a>
        </div>
      </div>
    </div>
    <div class="rounded-2xl overflow-hidden shadow-lg min-h-[320px]">
      <iframe src="{{map_embed_url}}" loading="lazy" referrerpolicy="no-referrer-when-downgrade" class="w-full h-full border-0" title="Standort auf Google Maps" aria-label="Karte mit unserem Standort"></iframe>
    </div>
  </div>
</section>
