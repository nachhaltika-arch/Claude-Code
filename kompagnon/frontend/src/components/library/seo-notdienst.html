<!--
  Block: seo-notdienst — Notdienst-Block (große Telefonnummer)
  Kategorie: SEO
  Slots: headline, subline, phone, phone_url, service_area, rate_info
-->
<section data-block="seo-notdienst" class="bg-gray-700 text-white py-14 md:py-20 px-6" style="font-family: 'Noto Sans', sans-serif;">
  <div class="max-w-3xl mx-auto text-center">
    <div class="inline-flex items-center gap-2 bg-gray-800/50 text-gray-300 text-xs font-black uppercase tracking-widest px-4 py-1.5 rounded-full mb-5">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="12" cy="12" r="6"/></svg>
      Erreichbar 24/7
    </div>
    <h2 class="text-3xl md:text-5xl font-black uppercase tracking-tight mb-4">{{headline}}</h2>
    <p class="text-base md:text-lg text-white/90 leading-relaxed mb-8 max-w-xl mx-auto">{{subline}}</p>

    <a href="{{phone_url}}" class="inline-flex items-center justify-center gap-3 bg-gray-300 text-black font-black px-8 py-5 rounded-xl text-2xl md:text-4xl hover:bg-gray-300 transition shadow-2xl mb-6">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <span class="whitespace-nowrap">{{phone}}</span>
    </a>
    <div class="text-sm text-white/85 space-y-1.5">
      <div class="font-semibold">{{service_area}}</div>
      <div class="text-xs text-white/70">{{rate_info}}</div>
    </div>
  </div>
</section>
