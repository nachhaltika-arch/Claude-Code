services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: claude-code-znq2
    runtime: python
    rootDir: kompagnon/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_PAGESPEED_API_KEY
        sync: false

  # ── Frontend (React) ───────────────────────────────────────────────────────
  - type: web
    name: kompagnon-frontend
    runtime: node
    rootDir: kompagnon/frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s build -l $PORT
    envVars:
      - key: NODE_VERSION
        value: 18.20.0
      - key: REACT_APP_API_URL
        value: https://claude-code-znq2.onrender.com
